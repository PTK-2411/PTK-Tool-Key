<!DOCTYPE html>
<html>
<head>
  <title>Lấy Key</title>
</head>
<body>

<h2 id="result">Đang kiểm tra key...</h2>

<button id="copyBtn" style="display:none;">📋 Copy Key</button>

<script>
  const params = new URLSearchParams(window.location.search);
  const key = params.get("key");

  const result = document.getElementById("result");
  const copyBtn = document.getElementById("copyBtn");

  if (key) {
    result.innerText = "Key của bạn là: " + key;
    copyBtn.style.display = "inline-block";
  } else {
    result.innerText = "Không tìm thấy key!";
  }

  // Nút copy
  copyBtn.addEventListener("click", function() {
    navigator.clipboard.writeText(key).then(() => {
      copyBtn.innerText = "✔ Đã copy!";
      setTimeout(() => {
        copyBtn.innerText = "📋 Copy Key";
      }, 1500);
    });
  });
</script>

</body>
</html>
