<!DOCTYPE html>
<html>
<head>
  <title>Lấy Key từ URL</title>
</head>
<body>

<h2 id="result">Đang kiểm tra key...</h2>

<script>
  // Lấy tham số từ URL
  const params = new URLSearchParams(window.location.search);
  const key = params.get("key");

  // Hiển thị key
  if (key) {
    document.getElementById("result").innerText = "Key của bạn là: " + key;
  } else {
    document.getElementById("result").innerText = "Không tìm thấy key!";
  }
</script>

</body>
</html>
